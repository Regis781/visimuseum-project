<script>
// ===================== SHARE LOGIC =====================
document.addEventListener('DOMContentLoaded', () => {
    const shareBtn = document.getElementById('shareBtn');
    
    if (shareBtn) {
        shareBtn.addEventListener('click', async () => {
            const shareData = {
                title: 'VISIMUSEUM',
                // Utilise la clé 'subtitle' de tes traductions
                text: t('subtitle') || 'Explore the greatest museums of the world',
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    // Option de secours pour PC/Anciens navigateurs
                    await navigator.clipboard.writeText(window.location.href);
                    // Utilise une alerte simple ou personnalisée
                    alert(lang === 'fr' ? 'Lien copié !' : (lang === 'es' ? '¡Enlace copiado!' : 'Link copied!'));
                }
            } catch (err) {
                console.warn('Share failed or cancelled');
            }
        });
    }
});

    { name:"Museum of Vampire Art", city:"Rouen", type:"Unusual", desc:"The world's only museum entirely dedicated to vampire mythology and imagery.", tags:["Unusual","Art"], url:"https://www.museumofvampireart.com" },
    { name:"Cancun Underwater Museum", city:"Cancún", type:"Unusual", desc:"Over 500 submerged sculptures forming an artificial reef you explore by diving.", tags:["Unusual","Art"], url:"https://musacancun.mx" },
];

// ===================== APP STATE =====================
let currentFilter = 'all';
let currentView = 'grid';

function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchMuseums();
}

function setView(view, btn) {
    currentView = view;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('resultsGrid').classList.toggle('list-view', view === 'list');
}

function searchMuseums() {
    const input = document.getElementById('citySearch').value.toLowerCase().trim();
    const grid = document.getElementById('resultsGrid');
    const sectionTitle = document.getElementById('sectionTitle');
    const statsText = document.getElementById('statsText');
    grid.innerHTML = '';

    let filtered = museums;
    if (input) {
        filtered = filtered.filter(m =>
            m.city.toLowerCase().includes(input) ||
            m.name.toLowerCase().includes(input) ||
            m.type.toLowerCase().includes(input)
        );
    }
    if (currentFilter !== 'all') {
        filtered = filtered.filter(m => m.tags.includes(currentFilter));
    }

    if (input) sectionTitle.textContent = `${t('resultsFor')} « ${input} »`;
    else if (currentFilter !== 'all') sectionTitle.textContent = t('filter' + currentFilter) || currentFilter;
    else sectionTitle.textContent = t('allMuseums');

    const count = filtered.length;
    statsText.innerHTML = `<strong>${count}</strong> ${count > 1 ? t('foundPlural') : t('found')}`;

    if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🏛</div><div class="empty-title">${t('noResult')}</div><p class="empty-sub">${t('noResultSub')}</p></div>`;
        return;
    }

    filtered.forEach((m, i) => {
        const isUnusual = m.tags.includes('Unusual');
        const card = document.createElement('div');
        card.className = 'museum-card';
        card.style.animationDelay = `${i * 0.025}s`;
        card.innerHTML = `
            <div class="card-color-band" style="${isUnusual ? 'background:linear-gradient(90deg,#2d1b4e,#c4a8e8)' : ''}"></div>
            <div class="card-body">
                <h3 class="museum-name">${m.name}</h3>
                <p class="card-desc">${m.desc}</p>
                <div class="card-tags">
                    <span class="tag tag-city">${m.city}</span>
                    <span class="tag ${isUnusual ? 'tag-unusual' : 'tag-type'}">${m.type}</span>
                </div>
                <div class="card-link-hint">${t('seeDetails')}</div>
            </div>`;
        card.addEventListener('click', () => openMuseum(m));
        grid.appendChild(card);
    });
}

// ===================== DETAIL PANEL =====================
function openMuseum(m) {
    document.getElementById('panelCity').textContent = m.city;
    document.getElementById('panelTitle').textContent = m.name;
    document.getElementById('panelType').textContent = m.type;
    document.getElementById('panelBody').innerHTML = `
        <div class="panel-loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">${t('loadingText')}</div>
        </div>`;
    document.getElementById('detailPanel').style.display = 'flex';
    document.getElementById('panelOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    fetchMuseumDetails(m);
}

function closePanel() {
    document.getElementById('detailPanel').style.display = 'none';
    document.getElementById('panelOverlay').classList.remove('open');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

async function fetchMuseumDetails(m) {
    const prompt = t('aiPrompt')
        .replace('{name}', m.name)
        .replace('{city}', m.city)
        .replace('{type}', m.type);
    try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 1000,
                messages: [{ role: 'user', content: prompt }]
            })
        });
        const data = await res.json();
        const text = data.content.find(b => b.type === 'text')?.text || '';
        const json = JSON.parse(text.replace(/```json|```/g, '').trim());
        renderPanel(json, m);
    } catch(e) {
        document.getElementById('panelBody').innerHTML = `
            <div style="text-align:center;padding:40px;color:var(--text-muted)">
                <div style="font-size:2rem;margin-bottom:12px">🏛</div>
                <p>${t('errorText')}</p>
                ${m.url ? `<a href="${m.url}" target="_blank" rel="noopener" class="panel-cta" style="margin-top:20px">${t('visitSite')}</a>` : ''}
            </div>`;
    }
}

// ===================== INIT =====================
document.getElementById('citySearch').addEventListener('input', searchMuseums);
applyTranslations();
searchMuseums();
</script>
