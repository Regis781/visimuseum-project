    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisiMuseum — Find Your Next Museum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* RESET */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* CSS VARIABLES */
        :root {
            --gold: #C9A84C;
            --gold-light: #E8D5A3;
            --gold-dim: rgba(201,168,76,0.12);
            --navy: #07111c;
            --navy-mid: #0f1e2e;
            --navy-light: #1c3450;
            --cream: #F5F1E8;
            --cream-dark: #E8E1CF;
            --text-dark: #18181b;
            --text-muted: #6b6355;
            --white: #FFFFFF;
            --card-shadow: 0 2px 20px rgba(7,17,28,0.07), 0 1px 4px rgba(7,17,28,0.04);
            --card-shadow-hover: 0 16px 48px rgba(7,17,28,0.14), 0 4px 12px rgba(7,17,28,0.08);
            --unusual-dark: #1a0d30;
            --unusual-light: #c4a8e8;
            --free-color: #059669;
            --free-bg: rgba(5,150,105,0.1);
            --free-border: rgba(5,150,105,0.25);
            --paid-color: #c47d20;
            --paid-bg: rgba(196,125,32,0.1);
            --paid-border: rgba(196,125,32,0.25);
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* LANGUAGE SWITCHER */
        .lang-switcher {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .lang-btn {
            width: 40px;
            height: 30px;
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 1.35rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(7,17,28,0.6);
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            opacity: 0.5;
        }

        .lang-btn:hover { opacity: 1; border-color: var(--gold); }
        .lang-btn.active { opacity: 1; border-color: var(--gold); background: rgba(201,168,76,0.2); }

        /* ====== HEADER ====== */
        header {
            background: var(--navy);
            position: relative;
            overflow: hidden;
            padding: 90px 20px 64px;
            text-align: center;
        }

        /* Animated star field */
        .stars-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .stars-layer::before,
        .stars-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 50% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,0.35) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.45) 0%, transparent 100%),
                radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 80%, rgba(255,255,255,0.35) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 90% 30%, rgba(201,168,76,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 45% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 50%, rgba(201,168,76,0.3) 0%, transparent 100%);
            background-size: 200px 200px, 300px 250px, 250px 300px, 350px 200px, 200px 300px,
                             400px 200px, 150px 300px, 300px 350px, 250px 200px, 350px 300px;
            animation: starDrift 60s linear infinite;
        }
        .stars-layer::after {
            background-size: 280px 260px, 200px 350px, 320px 220px, 240px 310px, 380px 240px,
                             160px 340px, 300px 280px, 220px 260px, 360px 320px, 180px 200px;
            animation-duration: 90s;
            animation-direction: reverse;
            opacity: 0.6;
        }
        @keyframes starDrift {
            from { transform: translateX(0) translateY(0); }
            to { transform: translateX(-200px) translateY(-100px); }
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 80% at 15% 60%, rgba(201,168,76,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 85% 20%, rgba(28,52,80,0.7) 0%, transparent 55%),
                radial-gradient(ellipse 40% 50% at 50% 100%, rgba(201,168,76,0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 1;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(201,168,76,0.6) 30%, var(--gold) 50%, rgba(201,168,76,0.6) 70%, transparent 100%);
            z-index: 2;
        }

        .header-top-actions {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
        }

        .share-icon-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }
        .share-icon-btn:hover { background: var(--gold); border-color: var(--gold); transform: translateY(-2px); }

        /* Header content above gradient overlays */
        .logo-line,
        .subtitle,
        .search-container,
        .filters {
            position: relative;
            z-index: 3;
        }

        .logo-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .logo-ornament {
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold));
        }
        .logo-ornament.right { background: linear-gradient(90deg, var(--gold), transparent); }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.4rem, 5.5vw, 4rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            color: var(--white);
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        h1 span { color: var(--gold); }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.15rem;
            color: var(--gold-light);
            margin-bottom: 44px;
            letter-spacing: 0.06em;
            opacity: 0.85;
        }

        /* SEARCH BAR */
        .search-container {
            display: flex;
            gap: 12px;
            max-width: 720px;
            margin: 0 auto 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-bar {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 250px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 6px;
            overflow: hidden;
            backdrop-filter: blur(12px);
            transition: border-color 0.3s, background 0.3s;
        }
        .search-bar:focus-within {
            border-color: var(--gold);
            background: rgba(255,255,255,0.10);
        }

        .search-icon {
            padding: 0 16px;
            color: var(--gold);
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        #citySearch {
            flex: 1;
            padding: 15px 0;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--white);
            letter-spacing: 0.02em;
        }
        #citySearch::placeholder { color: rgba(255,255,255,0.3); }

        .country-select-wrapper {
            position: relative;
            min-width: 180px;
        }
        #countrySelect {
            width: 100%;
            padding: 15px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 6px;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.3s;
        }
        #countrySelect:hover, #countrySelect:focus {
            border-color: var(--gold);
            outline: none;
        }
        #countrySelect option { background: #0f1e2e; color: var(--white); }

        /* FILTERS */
        .filters {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 18px;
            border-radius: 20px;
            border: 1px solid rgba(201,168,76,0.22);
            background: transparent;
            color: rgba(255,255,255,0.45);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.76rem;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(201,168,76,0.1);
        }
        .filter-btn.unusual-btn {
            border-color: rgba(196,168,232,0.25);
            color: rgba(196,168,232,0.55);
        }
        .filter-btn.unusual-btn:hover, .filter-btn.unusual-btn.active {
            border-color: var(--unusual-light);
            color: var(--unusual-light);
            background: rgba(196,168,232,0.08);
        }
        .filter-btn.free-btn {
            border-color: rgba(5,150,105,0.25);
            color: rgba(5,150,105,0.65);
        }
        .filter-btn.free-btn:hover, .filter-btn.free-btn.active {
            border-color: var(--free-color);
            color: var(--free-color);
            background: var(--free-bg);
        }

        /* STATS BAR */
        .stats-bar {
            background: var(--navy-mid);
            padding: 12px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(201,168,76,0.12);
            gap: 12px;
        }
        .stats-info {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .stats-info strong { color: var(--gold); font-weight: 500; }
        .stats-free-count {
            font-size: 0.72rem;
            color: rgba(5,150,105,0.8);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding-left: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stats-free-dot {
            width: 6px; height: 6px;
            background: var(--free-color);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .view-toggle { display: flex; gap: 4px; }
        .view-btn {
            padding: 5px 8px;
            border: 1px solid rgba(201,168,76,0.18);
            background: transparent;
            cursor: pointer;
            border-radius: 3px;
            color: rgba(255,255,255,0.3);
            transition: all 0.2s;
        }
        .view-btn.active, .view-btn:hover { border-color: var(--gold); color: var(--gold); }

        /* MAIN CONTENT */
        main { max-width: 1320px; margin: 0 auto; padding: 50px 30px; }
        .section-header { margin-bottom: 28px; display: flex; align-items: baseline; gap: 16px; }
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.7rem;
            font-weight: 300;
            color: var(--navy);
        }
        .section-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--cream-dark), transparent); }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .results.list-view { grid-template-columns: 1fr; }

        /* ====== CARDS ====== */
        .museum-card {
            background: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.4s ease both;
            position: relative;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .museum-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-shadow-hover);
        }
        .results.list-view .museum-card {
            flex-direction: row;
            min-height: 88px;
        }

        /* Color band with gradient by type */
        .card-color-band {
            height: 5px;
            background: linear-gradient(90deg, var(--navy-light), var(--gold));
            flex-shrink: 0;
            transition: height 0.2s;
        }
        .museum-card:hover .card-color-band { height: 7px; }
        .results.list-view .card-color-band { height: auto; width: 5px; }
        .results.list-view .museum-card:hover .card-color-band { height: auto; width: 7px; }

        .card-body {
            padding: 20px 22px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .results.list-view .card-body {
            flex-direction: row;
            align-items: center;
            gap: 24px;
            padding: 14px 22px;
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .museum-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--navy);
            line-height: 1.22;
            flex: 1;
        }

        /* Price badge */
        .price-badge {
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .price-badge::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .price-badge.free {
            background: var(--free-bg);
            color: var(--free-color);
            border: 1px solid var(--free-border);
        }
        .price-badge.free::before { background: var(--free-color); }
        .price-badge.paid {
            background: var(--paid-bg);
            color: var(--paid-color);
            border: 1px solid var(--paid-border);
        }
        .price-badge.paid::before { background: var(--paid-color); }

        .card-desc {
            font-size: 0.81rem;
            color: var(--text-muted);
            line-height: 1.55;
            flex: 1;
        }
        .results.list-view .card-desc { display: none; }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: auto;
            padding-top: 12px;
        }
        .results.list-view .card-tags { margin-top: 0; padding-top: 0; flex-shrink: 0; }

        .tag {
            padding: 2px 9px;
            border-radius: 3px;
            font-size: 0.67rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .tag-city { background: var(--navy); color: var(--gold-light); }
        .tag-country {
            background: rgba(201,168,76,0.12);
            color: rgba(160,120,40,0.9);
            border: 1px solid rgba(201,168,76,0.25);
        }
        .tag-type { background: var(--cream-dark); color: var(--text-muted); }
        .tag-unusual { background: var(--unusual-dark); color: var(--unusual-light); }

        .card-link-hint {
            margin-top: 12px;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.75;
            transition: opacity 0.2s;
        }
        .museum-card:hover .card-link-hint { opacity: 1; }

        /* EMPTY STATE */
        .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; }
        .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.25; }
        .empty-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--navy); margin-bottom: 8px; }
        .empty-sub { font-size: 0.85rem; color: var(--text-muted); }

        /* ====== DETAIL PANEL ====== */
        .panel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(7,17,28,0.7);
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        .panel-overlay.open { display: block; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .detail-panel {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: min(620px, 100vw);
            background: var(--cream);
            z-index: 101;
            overflow-y: auto;
            animation: slideIn 0.38s cubic-bezier(0.16,1,0.3,1);
            display: flex;
            flex-direction: column;
            box-shadow: -8px 0 40px rgba(7,17,28,0.2);
        }

        .panel-header {
            background: linear-gradient(160deg, #07111c 0%, #0f1e2e 100%);
            padding: 32px 32px 28px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid rgba(201,168,76,0.2);
        }

        .panel-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .panel-close {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(201,168,76,0.2);
            color: var(--gold-light);
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .panel-close:hover { background: rgba(201,168,76,0.15); border-color: var(--gold); color: var(--gold); }

        .panel-city-tag {
            font-size: 0.7rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .panel-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 300;
            color: var(--white);
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .panel-badges { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        .panel-type-badge {
            display: inline-block;
            padding: 3px 12px;
            background: rgba(201,168,76,0.12);
            border: 1px solid rgba(201,168,76,0.22);
            border-radius: 3px;
            font-size: 0.73rem;
            color: var(--gold-light);
            letter-spacing: 0.05em;
        }

        .panel-price-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .panel-price-badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .panel-price-badge.free {
            background: rgba(5,150,105,0.15);
            color: #10b981;
            border: 1px solid rgba(5,150,105,0.35);
        }
        .panel-price-badge.free::before { background: #10b981; }
        .panel-price-badge.paid {
            background: rgba(196,125,32,0.15);
            color: #d97706;
            border: 1px solid rgba(196,125,32,0.35);
        }
        .panel-price-badge.paid::before { background: #d97706; }

        .panel-body { padding: 32px; flex: 1; }

        .panel-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 16px;
        }
        .loading-spinner {
            width: 36px; height: 36px;
            border: 2px solid var(--cream-dark);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .panel-section { margin-bottom: 32px; }
        .panel-section-title {
            font-size: 0.68rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--cream-dark);
        }
        .panel-intro {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            line-height: 1.75;
            color: var(--text-dark);
        }

        .masterpiece-list { display: flex; flex-direction: column; gap: 10px; }
        .masterpiece-item {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            padding: 14px 16px;
            background: var(--white);
            border-radius: 6px;
            border-left: 3px solid var(--gold);
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
        }

function initCountrySelect() {
    const countrySelect = document.getElementById('countrySelect');
    const countries = [...new Set(museums.map(m => m.country))].sort();
    
    countries.forEach(country => {
        const option = document.createElement('option');
        option.value = country;
        option.textContent = country;
        countrySelect.appendChild(option);
    });
    
    countrySelect.addEventListener('change', (e) => {
        currentCountry = e.target.value;
        searchMuseums();
    });
}

function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchMuseums();
}

function setView(view, btn) {
    currentView = view;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('resultsGrid').classList.toggle('list-view', view === 'list');
}

function debounce(func, delay) {
    return function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => func(), delay);
    };
}

const debouncedSearch = debounce(searchMuseums, 300);

function searchMuseums() {
    const input = document.getElementById('citySearch').value.toLowerCase().trim();
    const grid = document.getElementById('resultsGrid');
    const sectionTitle = document.getElementById('sectionTitle');
    const statsText = document.getElementById('statsText');
    grid.innerHTML = '';

    let filtered = museums;

    // Filter by country
    if (currentCountry) {
        filtered = filtered.filter(m => m.country === currentCountry);
    }

    // Filter by search input
    if (input) {
        filtered = filtered.filter(m =>
            m.city.toLowerCase().includes(input) ||
            m.name.toLowerCase().includes(input) ||
            m.type.toLowerCase().includes(input)
        );
    }

    // Filter by category
    if (currentFilter !== 'all') {
        if (currentFilter === 'free') {
            filtered = filtered.filter(m => m.admission === 'free');
        } else {
            filtered = filtered.filter(m => m.tags.includes(currentFilter));
        }
    }

    // Update title
    if (currentCountry && input) {
        sectionTitle.textContent = `${t('resultsFor')} "${input}" ${t('in')} ${currentCountry}`;
    } else if (currentCountry) {
        sectionTitle.textContent = currentCountry;
    } else if (input) {
        sectionTitle.textContent = `${t('resultsFor')} « ${input} »`;
    } else if (currentFilter !== 'all') {
        sectionTitle.textContent = t('filter' + currentFilter) || t('filterFree') || currentFilter;
    } else {
        sectionTitle.textContent = t('allMuseums');
    }

    const count = filtered.length;
    const freeCount = filtered.filter(m => m.admission === 'free').length;
    statsText.innerHTML = `<strong>${count}</strong> ${count > 1 ? t('foundPlural') : t('found')}`;
    
    const statsFreeEl = document.getElementById('statsFree');
    if (statsFreeEl && freeCount > 0 && currentFilter !== 'free') {
        statsFreeEl.innerHTML = `<span class="stats-free-dot"></span>${freeCount} ${t('freeCount')}`;
        statsFreeEl.style.display = 'flex';
    } else if (statsFreeEl) {
        statsFreeEl.style.display = 'none';
    }

    if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🏛</div><div class="empty-title">${t('noResult')}</div><p class="empty-sub">${t('noResultSub')}</p></div>`;
        return;
    }

    filtered.forEach((m, i) => {
        const isUnusual = m.tags.includes('Unusual');
        const card = document.createElement('div');
        card.className = 'museum-card';
        card.style.animationDelay = `${i * 0.025}s`;
        
        const admissionText = m.admission === 'free' ? t('free') : t('paid');
        const admissionClass = m.admission === 'free' ? 'free' : 'paid';
        
        // Color band by category
        let bandStyle = '';
        if (isUnusual) bandStyle = 'background: linear-gradient(90deg, #1a0d30, #c4a8e8)';
        else if (m.tags.includes('Art') && m.tags.includes('History')) bandStyle = 'background: linear-gradient(90deg, #3a4a6b, #C9A84C)';
        else if (m.tags.includes('Science') || m.tags.includes('Nature')) bandStyle = 'background: linear-gradient(90deg, #1e4a38, #3db88a)';
        else if (m.tags.includes('Modern')) bandStyle = 'background: linear-gradient(90deg, #3a1e5c, #9b6de8)';
        else if (m.tags.includes('Art')) bandStyle = 'background: linear-gradient(90deg, #5c3a1e, #C9A84C)';
        else if (m.tags.includes('History')) bandStyle = 'background: linear-gradient(90deg, #1e2e5c, #6080c0)';
        
        card.innerHTML = `
            <div class="card-color-band" style="${bandStyle}"></div>
            <div class="card-body">
                <div class="card-top">
                    <h3 class="museum-name">${escapeHtml(m.name)}</h3>
                    <span class="price-badge ${admissionClass}">${admissionText}</span>
                </div>
                <p class="card-desc">${escapeHtml(m.desc)}</p>
                <div class="card-tags">
                    <span class="tag tag-country">${escapeHtml(m.country)}</span>
                    <span class="tag tag-city">${escapeHtml(m.city)}</span>
                    <span class="tag ${isUnusual ? 'tag-unusual' : 'tag-type'}">${escapeHtml(m.type)}</span>
                </div>
                <div class="card-link-hint">${t('seeDetails')}</div>
            </div>`;
        card.addEventListener('click', () => openMuseum(m));
        grid.appendChild(card);
    });
}

function escapeHtml(text) {
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, m => map[m]);
}

function openMuseum(m) {
    document.getElementById('panelCity').textContent = `${m.city}, ${m.country}`;
    document.getElementById('panelTitle').textContent = m.name;
    document.getElementById('panelType').textContent = m.type;
    
    const admissionText = m.admission === 'free' ? t('free') : t('paid');
    const admissionClass = m.admission === 'free' ? 'free' : 'paid';
    document.getElementById('panelPrice').textContent = admissionText;
    document.getElementById('panelPrice').className = `panel-price-badge ${admissionClass}`;
    
    document.getElementById('panelBody').innerHTML = `
        <div class="panel-loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">${t('loadingText')}</div>
        </div>`;
    document.getElementById('detailPanel').style.display = 'flex';
    document.getElementById('panelOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    fetchMuseumDetails(m);
}

async function fetchMuseumDetails(m) {
    const prompts = {
        en: `You are a world museum expert. Generate a detailed fact sheet about the museum "${m.name}" in ${m.city}, ${m.country} (type: ${m.type}). Reply ONLY in valid JSON, no markdown, no backticks, with exactly this structure: {"intro":"A captivating introduction (3-4 sentences).","masterpieces":[{"name":"Artwork name","detail":"Artist, date, and why unmissable (1-2 sentences)."},{"name":"...","detail":"..."},{"name":"...","detail":"..."},{"name":"...","detail":"..."},{"name":"...","detail":"..."}],"infos":{"horaires":"e.g. Tue-Sun 9am-6pm","fermeture":"e.g. Monday, Dec 25","prix":"${m.admission === 'free' ? 'Free admission' : 'e.g. €17 / Free under 18'}","acces":"e.g. Metro: Line 1"},"tips":["Practical tip 1","Practical tip 2","Practical tip 3"]}`,
        fr: `Tu es un expert en musées du monde. Génère une fiche détaillée sur le musée "${m.name}" à ${m.city}, ${m.country} (type: ${m.type}). Réponds UNIQUEMENT en JSON valide, sans markdown, sans backticks, avec exactement cette structure : {"intro":"Paragraphe captivant (3-4 phrases).","masterpieces":[{"name":"Nom de l'œuvre","detail":"Artiste, date, pourquoi incontournable (1-2 phrases)."},{"name":"...","detail":"..."},{"name":"...","detail":"..."},{"name":"...","detail":"..."},{"name":"...","detail":"..."}],"infos":{"horaires":"ex: Mar-Dim 9h-18h","fermeture":"ex: Lundi, 25 déc","prix":"${m.admission === 'free' ? 'Entrée gratuite' : 'ex: 17€ / Gratuit -18 ans'}","acces":"ex: Métro ligne 1"},"tips":["Conseil pratique 1","Conseil pratique 2","Conseil pratique 3"]}`,
        es: `Eres un experto en museos. Genera una ficha detallada sobre el museo "${m.name}" en ${m.city}, ${m.country} (tipo: ${m.type}). Responde ÚNICAMENTE en JSON válido, sin markdown, sin backticks, con exactamente esta estructura: {"intro":"Párrafo cautivador (3-4 frases).","masterpieces":[{"name":"Nombre de la obra","detail":"Artista, fecha, por qué es imprescindible (1-2 frases)."},{"name":"...","detail":"..."},{"name":"...","detail":"..."},{"name":"...","detail":"..."},{"name":"...","detail":"..."}],"infos":{"horaires":"ej: Mar-Dom 9h-18h","fermeture":"ej: Lunes, 25 dic","prix":"${m.admission === 'free' ? 'Entrada gratuita' : 'ej: 17€ / Gratis -18 años'}","acces":"ej: Metro línea 1"},"tips":["Consejo práctico 1","Consejo práctico 2","Consejo práctico 3"]}`
    };
    
    try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 1000,
                messages: [{ role: 'user', content: prompts[lang] || prompts.en }]
            })
        });
        const data = await res.json();
        const text = data.content?.find(b => b.type === 'text')?.text || '';
        const json = JSON.parse(text.replace(/```json|```/g, '').trim());
        renderPanel(json, m);
    } catch(e) {
        document.getElementById('panelBody').innerHTML = `
            <div style="text-align:center;padding:50px 20px;color:var(--text-muted)">
                <div style="font-size:2.5rem;margin-bottom:14px;opacity:0.3">🏛</div>
                <p style="font-family:'Cormorant Garamond',serif;font-size:1.1rem">${t('errorText')}</p>
                ${m.url ? `<a href="${m.url}" target="_blank" rel="noopener" class="panel-cta" style="margin-top:24px">${t('visitSite')}</a>` : ''}
            </div>`;
    }
}

                    X

        </div>
        ${m.url ? `<a href="${m.url}" target="_blank" rel="noopener" class="panel-cta">${lang==='fr'?'Visiter le site officiel →':lang==='es'?'Visitar sitio oficial →':'Visit official website →'}</a>` : ''}
    `;
}

function closePanel() {
    document.getElementById('detailPanel').style.display = 'none';
    document.getElementById('panelOverlay').classList.remove('open');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePanel();
});

// ===================== EVENT LISTENERS & INIT =====================
document.addEventListener('DOMContentLoaded', () => {
    // Share button handler
    const shareBtn = document.getElementById('shareBtn');
    if (shareBtn) {
        shareBtn.addEventListener('click', async () => {
            const shareData = {
                title: 'VISIMUSEUM',
                text: t('subtitle') || 'Explore the greatest museums of the world',
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    await navigator.clipboard.writeText(window.location.href);
                    const msg = lang === 'fr' ? 'Lien copié !' : (lang === 'es' ? '¡Enlace copiado!' : 'Link copied!');
                    alert(msg);
                }
            } catch (err) {
                console.warn('Share failed or cancelled:', err);
            }
        });
    }

    // Search input listener
    const searchInput = document.getElementById('citySearch');
    if (searchInput) {
        searchInput.addEventListener('input', debouncedSearch);
    }

    // Initialize app
    initCountrySelect();
    applyTranslations();
    searchMuseums();
});
</script>
</body>
</html>
