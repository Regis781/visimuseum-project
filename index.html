    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* RESET */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* CSS VARIABLES */
        :root {
            --gold: #C9A84C;
            --gold-light: #E8D5A3;
            --gold-dim: rgba(201,168,76,0.12);
            --navy: #07111c;
            --navy-mid: #0f1e2e;
            --navy-light: #1c3450;
            --cream: #F5F1E8;
            --cream-dark: #E8E1CF;
            --text-dark: #18181b;
            --text-muted: #6b6355;
            --white: #FFFFFF;
            --card-shadow: 0 2px 20px rgba(7,17,28,0.07), 0 1px 4px rgba(7,17,28,0.04);
            --card-shadow-hover: 0 16px 48px rgba(7,17,28,0.14), 0 4px 12px rgba(7,17,28,0.08);
            --unusual-dark: #1a0d30;
            --unusual-light: #c4a8e8;
            --free-color: #059669;
            --free-bg: rgba(5,150,105,0.1);
            --free-border: rgba(5,150,105,0.25);
            --paid-color: #c47d20;
            --paid-bg: rgba(196,125,32,0.1);
            --paid-border: rgba(196,125,32,0.25);
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* LANGUAGE SWITCHER */
        .lang-switcher {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .lang-btn {
            width: 40px;
            height: 30px;
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 1.35rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(7,17,28,0.6);
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            opacity: 0.5;
        }

        .lang-btn:hover { opacity: 1; border-color: var(--gold); }
        .lang-btn.active { opacity: 1; border-color: var(--gold); background: rgba(201,168,76,0.2); }

        /* ====== HEADER ====== */
        header {
            background: var(--navy);
            position: relative;
            overflow: hidden;
            padding: 90px 20px 64px;
            text-align: center;
        }

        /* Animated star field */
        .stars-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .stars-layer::before,
        .stars-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 50% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,0.35) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.45) 0%, transparent 100%),
                radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 80%, rgba(255,255,255,0.35) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 90% 30%, rgba(201,168,76,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 45% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 50%, rgba(201,168,76,0.3) 0%, transparent 100%);
            background-size: 200px 200px, 300px 250px, 250px 300px, 350px 200px, 200px 300px,
                             400px 200px, 150px 300px, 300px 350px, 250px 200px, 350px 300px;
            animation: starDrift 60s linear infinite;
        }
        .stars-layer::after {
            background-size: 280px 260px, 200px 350px, 320px 220px, 240px 310px, 380px 240px,
                             160px 340px, 300px 280px, 220px 260px, 360px 320px, 180px 200px;
            animation-duration: 90s;
            animation-direction: reverse;
            opacity: 0.6;
        }
        @keyframes starDrift {
            from { transform: translateX(0) translateY(0); }
            to { transform: translateX(-200px) translateY(-100px); }
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 80% at 15% 60%, rgba(201,168,76,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 85% 20%, rgba(28,52,80,0.7) 0%, transparent 55%),
                radial-gradient(ellipse 40% 50% at 50% 100%, rgba(201,168,76,0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 1;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(201,168,76,0.6) 30%, var(--gold) 50%, rgba(201,168,76,0.6) 70%, transparent 100%);
            z-index: 2;
        }

        .header-top-actions {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
        }

        .share-icon-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }
        .share-icon-btn:hover { background: var(--gold); border-color: var(--gold); transform: translateY(-2px); }

        /* Header content above gradient overlays */
        .logo-line,
        .subtitle,
        .search-container,
        .filters {
            position: relative;
            z-index: 3;
        }

        .logo-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .logo-ornament {
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold));
        }
        .logo-ornament.right { background: linear-gradient(90deg, var(--gold), transparent); }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.4rem, 5.5vw, 4rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            color: var(--white);
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        h1 span { color: var(--gold); }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.15rem;
            color: var(--gold-light);
            margin-bottom: 44px;
            letter-spacing: 0.06em;
            opacity: 0.85;
        }

        /* SEARCH BAR */
        .search-container {
            display: flex;
            gap: 12px;
            max-width: 720px;
            margin: 0 auto 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-bar {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 250px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 6px;
            overflow: hidden;
            backdrop-filter: blur(12px);
            transition: border-color 0.3s, background 0.3s;
        }
        .search-bar:focus-within {
            border-color: var(--gold);
            background: rgba(255,255,255,0.10);
        }

        .search-icon {
            padding: 0 16px;
            color: var(--gold);
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        #citySearch {
            flex: 1;
            padding: 15px 0;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--white);
            letter-spacing: 0.02em;
        }
        #citySearch::placeholder { color: rgba(255,255,255,0.3); }

        .country-select-wrapper {
            position: relative;
            min-width: 180px;
        }
        #countrySelect {
            width: 100%;
            padding: 15px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 6px;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.3s;
        }
        #countrySelect:hover, #countrySelect:focus {
            border-color: var(--gold);
            outline: none;
        }
        #countrySelect option { background: #0f1e2e; color: var(--white); }

        /* FILTERS */
        .filters {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 18px;
            border-radius: 20px;
            border: 1px solid rgba(201,168,76,0.22);
            background: transparent;
            color: rgba(255,255,255,0.45);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.76rem;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(201,168,76,0.1);
        }
        .filter-btn.unusual-btn {
            border-color: rgba(196,168,232,0.25);
            color: rgba(196,168,232,0.55);
        }
        .filter-btn.unusual-btn:hover, .filter-btn.unusual-btn.active {
            border-color: var(--unusual-light);
            color: var(--unusual-light);
            background: rgba(196,168,232,0.08);
        }
        .filter-btn.free-btn {
            border-color: rgba(5,150,105,0.25);
            color: rgba(5,150,105,0.65);
        }
        .filter-btn.free-btn:hover, .filter-btn.free-btn.active {
            border-color: var(--free-color);
            color: var(--free-color);
            background: var(--free-bg);
        }

        /* STATS BAR */
        .stats-bar {
            background: var(--navy-mid);
            padding: 12px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(201,168,76,0.12);
            gap: 12px;
        }
        .stats-info {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .stats-info strong { color: var(--gold); font-weight: 500; }
        .stats-free-count {
            font-size: 0.72rem;
            color: rgba(5,150,105,0.8);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding-left: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stats-free-dot {
            width: 6px; height: 6px;
            background: var(--free-color);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .view-toggle { display: flex; gap: 4px; }
        .view-btn {
            padding: 5px 8px;
            border: 1px solid rgba(201,168,76,0.18);
            background: transparent;
            cursor: pointer;
            border-radius: 3px;
            color: rgba(255,255,255,0.3);
            transition: all 0.2s;
        }
        .view-btn.active, .view-btn:hover { border-color: var(--gold); color: var(--gold); }

        /* MAIN CONTENT */
        main { max-width: 1320px; margin: 0 auto; padding: 50px 30px; }
        .section-header { margin-bottom: 28px; display: flex; align-items: baseline; gap: 16px; }
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.7rem;
            font-weight: 300;
            color: var(--navy);
        }
        .section-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--cream-dark), transparent); }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .results.list-view { grid-template-columns: 1fr; }

        /* ====== CARDS ====== */
        .museum-card {
            background: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.4s ease both;
            position: relative;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .museum-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-shadow-hover);
        }
        .results.list-view .museum-card {
            flex-direction: row;
            min-height: 88px;
        }

        /* Color band with gradient by type */
        .card-color-band {
            height: 5px;
            background: linear-gradient(90deg, var(--navy-light), var(--gold));
            flex-shrink: 0;
            transition: height 0.2s;
        }
        .museum-card:hover .card-color-band { height: 7px; }
        .results.list-view .card-color-band { height: auto; width: 5px; }
        .results.list-view .museum-card:hover .card-color-band { height: auto; width: 7px; }

        .card-body {
            padding: 20px 22px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .results.list-view .card-body {
            flex-direction: row;
            align-items: center;
            gap: 24px;
            padding: 14px 22px;
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .museum-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--navy);
            line-height: 1.22;
            flex: 1;
        }

        /* Price badge */
        .price-badge {
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .price-badge::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .price-badge.free {
            background: var(--free-bg);
            color: var(--free-color);
            border: 1px solid var(--free-border);
        }
        .price-badge.free::before { background: var(--free-color); }
        .price-badge.paid {
            background: var(--paid-bg);
            color: var(--paid-color);
            border: 1px solid var(--paid-border);
        }
        .price-badge.paid::before { background: var(--paid-color); }

        .card-desc {
            font-size: 0.81rem;
            color: var(--text-muted);
            line-height: 1.55;
            flex: 1;
        }
        .results.list-view .card-desc { display: none; }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: auto;
            padding-top: 12px;
        }
        .results.list-view .card-tags { margin-top: 0; padding-top: 0; flex-shrink: 0; }

        .tag {
            padding: 2px 9px;
            border-radius: 3px;
            font-size: 0.67rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .tag-city { background: var(--navy); color: var(--gold-light); }
        .tag-country {
            background: rgba(201,168,76,0.12);
            color: rgba(160,120,40,0.9);
            border: 1px solid rgba(201,168,76,0.25);
        }
        .tag-type { background: var(--cream-dark); color: var(--text-muted); }
        .tag-unusual { background: var(--unusual-dark); color: var(--unusual-light); }

        .card-link-hint {
            margin-top: 12px;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.75;
            transition: opacity 0.2s;

        .museum-card:hover .card-link-hint { opacity: 1; }

            z-index: 100;
            backdrop-filter: blur(4px);

            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: min(620px, 100vw);
            background: var(--cream);
            z-index: 101;
            overflow-y: auto;
            animation: slideIn 0.38s cubic-bezier(0.16,1,0.3,1);
            display: flex;
            flex-direction: column;
            box-shadow: -8px 0 40px rgba(7,17,28,0.2);
        }

        .panel-header {
            background: linear-gradient(160deg, #07111c 0%, #0f1e2e 100%);
            padding: 32px 32px 28px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid rgba(201,168,76,0.2);
        }

        .panel-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .panel-close {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(201,168,76,0.2);
            color: var(--gold-light);
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .panel-close:hover { background: rgba(201,168,76,0.15); border-color: var(--gold); color: var(--gold); }

        .panel-city-tag {
            font-size: 0.7rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .panel-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 300;
            color: var(--white);
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .panel-badges { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        .panel-type-badge {
            display: inline-block;
            padding: 3px 12px;
            background: rgba(201,168,76,0.12);
            border: 1px solid rgba(201,168,76,0.22);
            border-radius: 3px;
            font-size: 0.73rem;
            color: var(--gold-light);
            letter-spacing: 0.05em;
        }

        .panel-price-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .panel-price-badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .panel-price-badge.free {
            background: rgba(5,150,105,0.15);
            color: #10b981;
            border: 1px solid rgba(5,150,105,0.35);
        }
        .panel-price-badge.free::before { background: #10b981; }
        .panel-price-badge.paid {
            background: rgba(196,125,32,0.15);
            color: #d97706;
            border: 1px solid rgba(196,125,32,0.35);
        }
        .panel-price-badge.paid::before { background: #d97706; }

        .panel-body { padding: 32px; flex: 1; }

        .panel-section { margin-bottom: 32px; }
        .panel-section-title {
            font-size: 0.68rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--cream-dark);
        }
        .panel-intro {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            line-height: 1.75;
            color: var(--text-dark);
        }

        .masterpiece-list { display: flex; flex-direction: column; gap: 10px; }
        .masterpiece-item {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            padding: 14px 16px;
            background: var(--white);
            border-radius: 6px;
            border-left: 3px solid var(--gold);
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
        }
        .masterpiece-item:hover { transform: translateX(2px); }
        .masterpiece-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            color: var(--gold);
            line-height: 1;
            flex-shrink: 0;
            width: 24px;
            text-align: center;
            opacity: 0.8;
        }
        .masterpiece-name { font-weight: 500; font-size: 0.88rem; color: var(--navy); margin-bottom: 2px; }
        .masterpiece-detail { font-size: 0.77rem; color: var(--text-muted); line-height: 1.4; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-item {
            background: var(--white);
            padding: 14px 16px;
            border-radius: 6px;
            box-shadow: var(--card-shadow);
        }
        .info-label { font-size: 0.66rem; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
        .info-value { font-size: 0.86rem; color: var(--navy); font-weight: 500; }

        .tips-list { display: flex; flex-direction: column; gap: 10px; }
        .tip-item {
            display: flex;
            gap: 10px;
            font-size: 0.84rem;
            color: var(--text-dark);
            line-height: 1.5;
            padding: 10px 14px;
            background: var(--white);
            border-radius: 6px;
        }
        .tip-icon { flex-shrink: 0; min-width: 20px; }

        .panel-share {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px dashed var(--cream-dark);
            flex-wrap: wrap;
        }
        .share-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(201,168,76,0.4);
            background: transparent;
            color: var(--navy);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .share-btn:hover { background: var(--gold); color: var(--white); border-color: var(--gold); }
        .share-btn svg { width: 14px; height: 14px; fill: currentColor; }

        .panel-cta {
            display: block;
            text-align: center;
            padding: 15px;
            background: var(--navy);
            color: var(--gold);
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.2s;
            margin-top: 8px;
            border: none;
            cursor: pointer;
        }
        .panel-cta:hover { background: var(--navy-light); }

        /* FOOTER */
        footer {
            background: var(--navy);
            color: rgba(255,255,255,0.45);
            border-top: 1px solid rgba(201,168,76,0.2);
        }
        .footer-inner {
            max-width: 1320px;
            margin: 0 auto;
            padding: 52px 30px 40px;
            display: flex;
            gap: 60px;
            align-items: flex-start;
        }

            flex-shrink: 0;
        }
        .footer-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: var(--white);
        }
        .footer-logo span { color: var(--gold); }
        .footer-tagline {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            margin-top: 8px;
            letter-spacing: 0.04em;
            font-style: italic;
            max-width: 200px;
        }

            display: flex;
            gap: 48px;
            flex-wrap: wrap;
            flex: 1;
        }
        .footer-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 110px;
        }

            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .footer-col a {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }
        .footer-col a:hover { color: var(--gold-light); }
        .footer-bottom {
            text-align: center;
            padding: 20px 30px;

            letter-spacing: 0.05em;
            border-top: 1px solid rgba(255,255,255,0.07);
            display: flex;
            justify-content: center;
            gap: 8px;

function sanitizeInput(text) {
    if (typeof text !== 'string') return '';
    const div = document.createElement('div');
    div.textContent = text.substring(0, 200);
    return div.innerHTML;
}

function validateMuseum(museum) {
    if (!museum || typeof museum !== 'object') {
        throw new Error('Invalid museum object');
    }
    
    const { name, city, country, type } = museum;
    
    if (!name || name.length > 100) {
        throw new Error('Invalid museum name');
    }
    if (!city || city.length > 100) {
        throw new Error('Invalid city');
    }
    if (!country || country.length > 100) {
        throw new Error('Invalid country');
    }
    if (!type || type.length > 100) {
        throw new Error('Invalid type');
    }
    
    return { name, city, country, type };
}

function t(key) {
    return i18n[lang]?.[key] || '';
}

function setLang(l) {
    lang = l;
    document.querySelectorAll('.lang-btn').forEach((b, i) => {
        b.classList.toggle('active', ['en', 'fr', 'es'][i] === l);
    });

    // ── SEO dynamique : mise à jour du <html lang> et des balises meta ──
    const localeMap = { en: 'en_US', fr: 'fr_FR', es: 'es_ES' };
    document.documentElement.lang = l;
    const metaOgLocale = document.querySelector('meta[property="og:locale"]');
    if (metaOgLocale) metaOgLocale.content = localeMap[l] || 'en_US';
    const canonical = document.querySelector('link[rel="canonical"]');
    if (canonical) canonical.href = `https://www.visimuseum.com/?lang=${l}`;
    const metaTitle = document.querySelector('meta[property="og:title"]');
    if (metaTitle && i18n[l]?.subtitle) {
        const titles = { en: 'VisiMuseum — Find Your Next Museum', fr: 'VisiMuseum — Trouvez votre prochain musée', es: 'VisiMuseum — Encuentra tu próximo museo' };
        document.title = titles[l] || titles.en;
        metaTitle.content = titles[l] || titles.en;
    }
    const metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc && i18n[l]?.subtitle) {
        const descs = {
            en: 'Discover the world\'s greatest museums in one place. Search by city, country or type — art, history, science, nature and more. Free & paid entry.',
            fr: 'Découvrez les plus grands musées du monde en un seul endroit. Cherchez par ville, pays ou type — art, histoire, science, nature et plus encore.',
            es: 'Descubre los mejores museos del mundo en un solo lugar. Busca por ciudad, país o tipo — arte, historia, ciencia, naturaleza y mucho más.'
        };
        metaDesc.content = descs[l] || descs.en;
    }
    // ── fin SEO dynamique ──

    applyTranslations();
    searchMuseums();
}

function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
    });
    const cityInput = document.getElementById('citySearch');
    if (cityInput) cityInput.placeholder = t('searchPlaceholder');
    
    const countrySelect = document.getElementById('countrySelect');
    if (countrySelect) {
        countrySelect.options[0].text = t('allCountries');
    }
}

function initCountrySelect() {
    const countrySelect = document.getElementById('countrySelect');
    const countries = [...new Set(museums.map(m => m.country))].sort();
    
    countries.forEach(country => {
        const option = document.createElement('option');
        option.value = country;
        option.textContent = country;
        countrySelect.appendChild(option);
    });
    
    countrySelect.addEventListener('change', (e) => {
        currentCountry = e.target.value;
        searchMuseums();
    });
}

function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchMuseums();
}

function setView(view, btn) {
    currentView = view;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('resultsGrid').classList.toggle('list-view', view === 'list');
}

function debounce(func, delay) {
    return function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => func(), delay);
    };
}

const debouncedSearch = debounce(searchMuseums, 300);

function searchMuseums() {
    const input = document.getElementById('citySearch').value.toLowerCase().trim();
    const grid = document.getElementById('resultsGrid');
    const sectionTitle = document.getElementById('sectionTitle');
    const statsText = document.getElementById('statsText');
    grid.innerHTML = '';

    let filtered = museums;

    if (currentCountry) {
        filtered = filtered.filter(m => m.country === currentCountry);
    }

    if (input) {
        filtered = filtered.filter(m =>
            m.city.toLowerCase().includes(input) ||
            m.name.toLowerCase().includes(input) ||
            m.type.toLowerCase().includes(input)
        );
    }

    if (currentFilter !== 'all') {
        if (currentFilter === 'free') {
            filtered = filtered.filter(m => m.admission === 'free');
        } else {
            filtered = filtered.filter(m => m.tags.includes(currentFilter));
        }
    }

    if (currentCountry && input) {
        sectionTitle.textContent = `${t('resultsFor')} "${input}" in ${currentCountry}`;
    } else if (currentCountry) {
        sectionTitle.textContent = currentCountry;
    } else if (input) {
        sectionTitle.textContent = `${t('resultsFor')} "${input}"`;
    } else if (currentFilter !== 'all') {
        sectionTitle.textContent = t('filter' + currentFilter) || t('filterFree') || currentFilter;
    } else {
        sectionTitle.textContent = t('allMuseums');
    }

    const count = filtered.length;
    const freeCount = filtered.filter(m => m.admission === 'free').length;
    statsText.innerHTML = `<strong>${count}</strong> ${count > 1 ? t('foundPlural') : t('found')}`;
    
    const statsFreeEl = document.getElementById('statsFree');
    if (statsFreeEl && freeCount > 0 && currentFilter !== 'free') {
        statsFreeEl.innerHTML = `<span class="stats-free-dot"></span>${freeCount} ${t('freeCount')}`;
        statsFreeEl.style.display = 'flex';
    } else if (statsFreeEl) {
        statsFreeEl.style.display = 'none';
    }

    if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🏛</div><div class="empty-title">${t('noResult')}</div><p class="empty-sub">${t('noResultSub')}</p></div>`;
        return;
    }

    filtered.forEach((m, i) => {
        const isUnusual = m.tags.includes('Unusual');
        const card = document.createElement('div');
        card.className = 'museum-card';
        card.style.animationDelay = `${i * 0.025}s`;
        
        const admissionText = m.admission === 'free' ? t('free') : t('paid');
        const admissionClass = m.admission === 'free' ? 'free' : 'paid';
        
        let bandStyle = '';
        if (isUnusual) bandStyle = 'background: linear-gradient(90deg, #1a0d30, #c4a8e8)';
        else if (m.tags.includes('Art') && m.tags.includes('History')) bandStyle = 'background: linear-gradient(90deg, #3a4a6b, #C9A84C)';
        else if (m.tags.includes('Science') || m.tags.includes('Nature')) bandStyle = 'background: linear-gradient(90deg, #1e4a38, #3db88a)';
        else if (m.tags.includes('Modern')) bandStyle = 'background: linear-gradient(90deg, #3a1e5c, #9b6de8)';
        else if (m.tags.includes('Art')) bandStyle = 'background: linear-gradient(90deg, #5c3a1e, #C9A84C)';
        else if (m.tags.includes('History')) bandStyle = 'background: linear-gradient(90deg, #1e2e5c, #6080c0)';
        
        card.innerHTML = `
            <div class="card-color-band" style="${bandStyle}"></div>
            <div class="card-body">
                <div class="card-top">
                    <h3 class="museum-name">${sanitizeInput(m.name)}</h3>
                    <span class="price-badge ${admissionClass}">${admissionText}</span>
                </div>
                <p class="card-desc">${sanitizeInput(m.desc)}</p>
                <div class="card-tags">
                    <span class="tag tag-country">${sanitizeInput(m.country)}</span>
                    <span class="tag tag-city">${sanitizeInput(m.city)}</span>
                    <span class="tag ${isUnusual ? 'tag-unusual' : 'tag-type'}">${sanitizeInput(m.type)}</span>
                </div>
                <div class="card-link-hint">${t('seeDetails')} &rarr;</div>
            </div>`;
        card.addEventListener('click', () => openMuseum(m));
        grid.appendChild(card);
    });
}

// ===================== SECURITY: Fetch Museum Details =====================
async function fetchMuseumDetails(m) {
    try {
        // Security: Rate limiting
        const now = Date.now();
        if (now - lastFetchTime < THROTTLE_DELAY) {
            console.warn('Too many requests. Please wait.');
            return;
        }
        lastFetchTime = now;

        // Security: Validation
        const museum = validateMuseum(m);
        
        // Security: Sanitize data
        const safeName = sanitizeInput(museum.name);
        const safeCity = sanitizeInput(museum.city);
        const safeCountry = sanitizeInput(museum.country);
        const safeType = sanitizeInput(museum.type);

        // Generate data
        const data = {
            intro: `${t('descWelcome')} <strong>${safeName}</strong>, ${t('descOne')} ${safeType.toLowerCase()} ${t('descIn')} ${safeCity}. ${t('descLocated')} ${safeCountry}, ${t('descShowcases')} ${t('descWhether')}`,
            masterpieces: [
                { name: t('mpMain'), detail: t('mpMainDesc') },
                { name: t('mpContemporary'), detail: t('mpContemporaryDesc') },
                { name: t('mpArchives'), detail: t('mpArchivesDesc') },
                { name: t('mpInteractive'), detail: t('mpInteractiveDesc') },
                { name: t('mpSpecial'), detail: t('mpSpecialDesc') }
            ],
            infos: {
                horaires: t('infoHours'),
                fermeture: t('infoClosed'),
                prix: t('infoPrice'),
                acces: t('infoAccess')
            },
            tips: [t('tip1'), t('tip2'), t('tip3')]
        };

        // Render safely
        renderPanel(data, m);

    } catch (error) {
        console.error('Error:', error.message);
        
        document.getElementById('panelBody').innerHTML = `
            <div style="text-align:center;padding:50px 20px;color:var(--text-muted)">
                <div style="font-size:2.5rem;margin-bottom:14px;opacity:0.3">🏛</div>
                <p style="font-family:'Cormorant Garamond',serif;font-size:1.1rem">${t('errorText')}</p>
                ${m?.url ? `<a href="${m.url}" target="_blank" rel="noopener noreferrer" class="panel-cta" style="margin-top:24px">${t('visitSite')} &rarr;</a>` : ''}
            </div>`;
    }
}

function openMuseum(m) {
    try {
        document.getElementById('panelCity').textContent = `${m.city}, ${m.country}`;
        document.getElementById('panelTitle').textContent = m.name;
        document.getElementById('panelType').textContent = m.type;
        
        const admissionText = m.admission === 'free' ? t('free') : t('paid');
        const admissionClass = m.admission === 'free' ? 'free' : 'paid';
        document.getElementById('panelPrice').textContent = admissionText;
        document.getElementById('panelPrice').className = `panel-price-badge ${admissionClass}`;
        
        document.getElementById('detailPanel').style.display = 'flex';
        document.getElementById('panelOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
        
        fetchMuseumDetails(m);
    } catch (error) {
        console.error('Error opening museum:', error);
    }
}

function closePanel() {
    document.getElementById('detailPanel').style.display = 'none';
    document.getElementById('panelOverlay').classList.remove('open');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePanel();
});

// ===================== EVENT LISTENERS & INIT =====================
document.addEventListener('DOMContentLoaded', () => {
    // Share button handler
    const shareBtn = document.getElementById('shareBtn');
    if (shareBtn) {
        shareBtn.addEventListener('click', async () => {
            const shareData = {
                title: 'VISIMUSEUM',
                text: t('subtitle') || 'Explore the greatest museums of the world',
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    await navigator.clipboard.writeText(window.location.href);
                    const msg = lang === 'fr' ? 'Lien copie !' : (lang === 'es' ? 'Enlace copiado!' : 'Link copied!');
                    alert(msg);
                }
            } catch (err) {
                console.warn('Share failed or cancelled');
            }
        });
    }

    // Search input listener
    const searchInput = document.getElementById('citySearch');
    if (searchInput) {
        searchInput.addEventListener('input', debouncedSearch);
    }

    // Initialize app
    initCountrySelect();
    applyTranslations();
    searchMuseums();
});
</script>
</body>
</html>
