<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisiMuseum — Find Your Next Museum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* RESET */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* CSS VARIABLES */
        :root {
            --gold: #C9A84C;
            --gold-light: #E8D5A3;
            --navy: #0D1B2A;
            --navy-mid: #1B2E45;
            --navy-light: #2C4A68;
            --cream: #F7F3EC;
            --cream-dark: #EDE7D9;
            --text-dark: #1a1a1a;
            --text-muted: #7a7060;
            --white: #FFFFFF;
            --card-shadow: 0 4px 30px rgba(13,27,42,0.08);
            --unusual-dark: #2d1b4e;
            --unusual-light: #c4a8e8;
            --free-color: #10b981;
            --paid-color: #f59e0b;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* LANGUAGE SWITCHER */
        .lang-switcher {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .lang-btn {
            width: 40px;
            height: 30px;
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 1.35rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(13, 27, 42, 0.6);
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            opacity: 0.5;
        }

        .lang-btn:hover {
            opacity: 1;
            border-color: var(--gold);
        }

        .lang-btn.active {
            opacity: 1;
            border-color: var(--gold);
            background: rgba(201, 168, 76, 0.2);
        }

        /* HEADER */
        header {
            background: var(--navy);
            position: relative;
            overflow: hidden;
            padding: 80px 20px 60px;
            text-align: center;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(201, 168, 76, 0.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(44, 74, 104, 0.6) 0%, transparent 50%);
            pointer-events: none;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .header-top-actions {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
        }

        .share-icon-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }

        .share-icon-btn:hover {
            background: white;
            color: black;
            transform: translateY(-2px);
        }

        .logo-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 12px;
        }

        .logo-ornament {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold));
        }

        .logo-ornament.right {
            background: linear-gradient(90deg, var(--gold), transparent);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 300;
            letter-spacing: 0.25em;
            color: var(--white);
        }

        h1 span {
            color: var(--gold);
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: var(--gold-light);
            margin-bottom: 40px;
            letter-spacing: 0.05em;
            opacity: 0.85;
        }

        /* SEARCH BAR */
        .search-container {
            display: flex;
            gap: 12px;
            max-width: 700px;
            margin: 0 auto 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-bar {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 250px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 4px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: border-color 0.3s;
        }

        .search-bar:focus-within {
            border-color: var(--gold);
        }

        .search-icon {
            padding: 0 16px;
            color: var(--gold);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #citySearch {
            flex: 1;
            padding: 16px 0;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--white);
            letter-spacing: 0.02em;
        }

        #citySearch::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        /* COUNTRY SELECT */
        .country-select-wrapper {
            position: relative;
            min-width: 180px;
            flex: 0 1 auto;
        }

        #countrySelect {
            width: 100%;
            padding: 16px 12px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 4px;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        #countrySelect:hover,
        #countrySelect:focus {
            border-color: var(--gold);
            outline: none;
        }

        #countrySelect option {
            background: var(--navy);
            color: var(--white);
            padding: 8px;
        }

        #countrySelect option:hover {
            background: var(--gold);
        }

        /* FILTERS */
        .filters {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 16px;
            border-radius: 2px;
            border: 1px solid rgba(201, 168, 76, 0.25);
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .filter-btn:hover,
        .filter-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(201, 168, 76, 0.08);
        }

        .filter-btn.unusual-btn {
            border-color: rgba(196, 168, 232, 0.3);
            color: rgba(196, 168, 232, 0.6);
        }

        .filter-btn.unusual-btn:hover,
        .filter-btn.unusual-btn.active {
            border-color: var(--unusual-light);
            color: var(--unusual-light);
            background: rgba(196, 168, 232, 0.08);
        }

        /* STATS BAR */
        .stats-bar {
            background: var(--navy-mid);
            padding: 14px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(201, 168, 76, 0.15);
        }

        .stats-info {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 0.05em;
        }

        .stats-info strong {
            color: var(--gold);
            font-weight: 500;
        }

        .view-toggle {
            display: flex;
            gap: 4px;
        }

        .view-btn {
            padding: 5px 8px;
            border: 1px solid rgba(201, 168, 76, 0.2);
            background: transparent;
            cursor: pointer;
            border-radius: 2px;
            color: rgba(255, 255, 255, 0.35);
            transition: all 0.2s;
        }

        .view-btn.active,
        .view-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* MAIN CONTENT */
        main {
            max-width: 1300px;
            margin: 0 auto;
            padding: 50px 30px;
        }

        .section-header {
            margin-bottom: 30px;
            display: flex;
            align-items: baseline;
            gap: 16px;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 300;
            color: var(--navy);
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--cream-dark), transparent);
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .results.list-view {
            grid-template-columns: 1fr;
        }

        /* MUSEUM CARDS */
        .museum-card {
            background: var(--white);
            border-radius: 3px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.4s ease both;
            position: relative;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .museum-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(13, 27, 42, 0.13);
        }

        .results.list-view .museum-card {
            flex-direction: row;
            min-height: 90px;
        }

        .card-color-band {
            height: 4px;
            background: linear-gradient(90deg, var(--navy-light), var(--gold));
            flex-shrink: 0;
        }

        .results.list-view .card-color-band {
            height: auto;
            width: 4px;
        }

        .card-body {
            padding: 22px 24px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .results.list-view .card-body {
            flex-direction: row;
            align-items: center;
            gap: 24px;
            padding: 16px 24px;
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .museum-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 400;
            color: var(--navy);
            line-height: 1.25;
            flex: 1;
        }

        .price-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .price-badge.free {
            background: rgba(16, 185, 129, 0.15);
            color: var(--free-color);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .price-badge.paid {
            background: rgba(245, 158, 11, 0.15);
            color: var(--paid-color);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .card-desc {
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .results.list-view .card-desc {
            display: none;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: auto;
            padding-top: 14px;
        }

        .results.list-view .card-tags {
            margin-top: 0;
            padding-top: 0;
            flex-shrink: 0;
        }

        .tag {
            padding: 3px 10px;
            border-radius: 2px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .tag-city {
            background: var(--navy);
            color: var(--gold-light);
        }

        .tag-country {
            background: rgba(201, 168, 76, 0.2);
            color: var(--gold);
            border: 1px solid rgba(201, 168, 76, 0.3);
        }

        .tag-type {
            background: var(--cream-dark);
            color: var(--text-muted);
        }

        .tag-unusual {
            background: var(--unusual-dark);
            color: var(--unusual-light);
        }

        .card-link-hint {
            margin-top: 14px;
            font-size: 0.75rem;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.8;
        }

        /* EMPTY STATE */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .empty-sub {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* DETAIL PANEL */
        .panel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(13, 27, 42, 0.65);
            z-index: 100;
            backdrop-filter: blur(3px);
        }

        .panel-overlay.open {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }

        .detail-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: min(600px, 100vw);
            background: var(--cream);
            z-index: 101;
            overflow-y: auto;
            animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: var(--navy);
            padding: 32px 32px 28px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid rgba(201, 168, 76, 0.2);
        }

        .panel-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .panel-close {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(201, 168, 76, 0.2);
            color: var(--gold-light);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .panel-close:hover {
            background: rgba(201, 168, 76, 0.15);
            border-color: var(--gold);
            color: var(--gold);
        }

        .panel-city-tag {
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .panel-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 300;
            color: var(--white);
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .panel-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .panel-type-badge {
            display: inline-block;
            padding: 3px 12px;
            background: rgba(201, 168, 76, 0.15);
            border: 1px solid rgba(201, 168, 76, 0.25);
            border-radius: 2px;
            font-size: 0.75rem;
            color: var(--gold-light);
            letter-spacing: 0.05em;
        }

        .panel-price-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .panel-price-badge.free {
            background: rgba(16, 185, 129, 0.2);
            color: var(--free-color);
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .panel-price-badge.paid {
            background: rgba(245, 158, 11, 0.2);
            color: var(--paid-color);
            border: 1px solid rgba(245, 158, 11, 0.4);
        }

        .panel-body {
            padding: 32px;
            flex: 1;
        }

        .panel-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 16px;
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 2px solid var(--cream-dark);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .panel-section {
            margin-bottom: 32px;
        }

        .panel-section-title {
            font-size: 0.7rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--cream-dark);
        }

        .panel-intro {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            line-height: 1.7;
            color: var(--text-dark);
        }

        .masterpiece-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .masterpiece-item {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            padding: 14px 16px;
            background: var(--white);
            border-radius: 3px;
            border-left: 3px solid var(--gold);
            box-shadow: var(--card-shadow);
        }

        .masterpiece-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            color: var(--gold);
            line-height: 1;
            flex-shrink: 0;
            width: 24px;
            text-align: center;
        }

        .masterpiece-name {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--navy);
            margin-bottom: 2px;
        }

        .masterpiece-detail {
            font-size: 0.78rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .info-item {
            background: var(--white);
            padding: 12px 16px;
            border-radius: 3px;
            box-shadow: var(--card-shadow);
        }

        .info-label {
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 0.88rem;
            color: var(--navy);
            font-weight: 500;
        }

        .tips-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tip-item {
            display: flex;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-dark);
            line-height: 1.5;
        }

        .tip-icon {
            flex-shrink: 0;
            min-width: 20px;
        }

        .panel-share {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px dashed var(--cream-dark);
            flex-wrap: wrap;
        }

        .share-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--navy);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .share-btn:hover {
            background: var(--gold);
            color: var(--white);
        }

        .share-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .panel-cta {
            display: block;
            text-align: center;
            padding: 14px;
            background: var(--navy);
            color: var(--gold);
            text-decoration: none;
            border-radius: 3px;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: background 0.2s;
            margin-top: 8px;
            border: none;
            cursor: pointer;
        }

        .panel-cta:hover {
            background: var(--navy-light);
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--cream-dark);
            letter-spacing: 0.05em;
        }

        footer span {
            color: var(--gold);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .search-container {
                flex-direction: column;
            }

            .search-bar, 
            .country-select-wrapper {
                width: 100%;
                min-width: auto;
            }

            .stats-bar {
                padding: 14px 20px;
                flex-direction: column;
                gap: 12px;
            }

            main {
                padding: 30px 20px;
            }

            .results {
                grid-template-columns: 1fr;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .card-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .price-badge {
                margin-left: 0;
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>

<div class="lang-switcher">

function initCountrySelect() {
    const countrySelect = document.getElementById('countrySelect');
    const countries = [...new Set(museums.map(m => m.country))].sort();
    
    countries.forEach(country => {
        const option = document.createElement('option');
        option.value = country;
        option.textContent = country;
        countrySelect.appendChild(option);
    });
    
    countrySelect.addEventListener('change', (e) => {
        currentCountry = e.target.value;
        searchMuseums();
    });
}

function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchMuseums();
}

function setView(view, btn) {
    currentView = view;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('resultsGrid').classList.toggle('list-view', view === 'list');
}

function debounce(func, delay) {
    return function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => func(), delay);
    };
}

const debouncedSearch = debounce(searchMuseums, 300);

function searchMuseums() {
    const input = document.getElementById('citySearch').value.toLowerCase().trim();
    const grid = document.getElementById('resultsGrid');
    const sectionTitle = document.getElementById('sectionTitle');
    const statsText = document.getElementById('statsText');
    grid.innerHTML = '';

    let filtered = museums;

    // Filter by country
    if (currentCountry) {
        filtered = filtered.filter(m => m.country === currentCountry);
    }

    // Filter by search input
    if (input) {
        filtered = filtered.filter(m =>
            m.city.toLowerCase().includes(input) ||
            m.name.toLowerCase().includes(input) ||
            m.type.toLowerCase().includes(input)
        );
    }

    // Filter by category
    if (currentFilter !== 'all') {
        filtered = filtered.filter(m => m.tags.includes(currentFilter));
    }

    // Update title
    if (currentCountry && input) {
        sectionTitle.textContent = `${t('resultsFor')} "${input}" ${t('in')} ${currentCountry}`;
    } else if (currentCountry) {
        sectionTitle.textContent = currentCountry;
    } else if (input) {
        sectionTitle.textContent = `${t('resultsFor')} « ${input} »`;
    } else if (currentFilter !== 'all') {
        sectionTitle.textContent = t('filter' + currentFilter) || currentFilter;
    } else {
        sectionTitle.textContent = t('allMuseums');
    }

    const count = filtered.length;
    statsText.innerHTML = `<strong>${count}</strong> ${count > 1 ? t('foundPlural') : t('found')}`;

    if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🏛</div><div class="empty-title">${t('noResult')}</div><p class="empty-sub">${t('noResultSub')}</p></div>`;
        return;
    }

    filtered.forEach((m, i) => {
        const isUnusual = m.tags.includes('Unusual');
        const card = document.createElement('div');
        card.className = 'museum-card';
        card.style.animationDelay = `${i * 0.025}s`;
        
        const admissionText = m.admission === 'free' ? t('free') : t('paid');
        const admissionClass = m.admission === 'free' ? 'free' : 'paid';
        
        card.innerHTML = `
            <div class="card-color-band" style="${isUnusual ? `background: linear-gradient(90deg, var(--unusual-dark), var(--unusual-light))` : ''}"></div>
            <div class="card-body">
                <div class="card-top">
                    <h3 class="museum-name">${escapeHtml(m.name)}</h3>
                    <span class="price-badge ${admissionClass}">${admissionText}</span>
                </div>
                <p class="card-desc">${escapeHtml(m.desc)}</p>
                <div class="card-tags">
                    <span class="tag tag-country">${escapeHtml(m.country)}</span>
                    <span class="tag tag-city">${escapeHtml(m.city)}</span>
                    <span class="tag ${isUnusual ? 'tag-unusual' : 'tag-type'}">${escapeHtml(m.type)}</span>
                </div>
                <div class="card-link-hint">${t('seeDetails')}</div>
            </div>`;
        card.addEventListener('click', () => openMuseum(m));
        grid.appendChild(card);
    });
}

function escapeHtml(text) {
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, m => map[m]);
}

function openMuseum(m) {
    document.getElementById('panelCity').textContent = `${m.city}, ${m.country}`;
    document.getElementById('panelTitle').textContent = m.name;
    document.getElementById('panelType').textContent = m.type;
    
    const admissionText = m.admission === 'free' ? t('free') : t('paid');
    const admissionClass = m.admission === 'free' ? 'free' : 'paid';
    document.getElementById('panelPrice').textContent = admissionText;
    document.getElementById('panelPrice').className = `panel-price-badge ${admissionClass}`;
    
    document.getElementById('panelBody').innerHTML = `
        <div class="panel-loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">${t('loadingText')}</div>
        </div>`;
    document.getElementById('detailPanel').style.display = 'flex';
    document.getElementById('panelOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closePanel() {
    document.getElementById('detailPanel').style.display = 'none';
    document.getElementById('panelOverlay').classList.remove('open');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePanel();
});

// ===================== EVENT LISTENERS & INIT =====================
document.addEventListener('DOMContentLoaded', () => {
    // Share button handler
    const shareBtn = document.getElementById('shareBtn');
    if (shareBtn) {
        shareBtn.addEventListener('click', async () => {
            const shareData = {
                title: 'VISIMUSEUM',
                text: t('subtitle') || 'Explore the greatest museums of the world',
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    await navigator.clipboard.writeText(window.location.href);
                    const msg = lang === 'fr' ? 'Lien copié !' : (lang === 'es' ? '¡Enlace copiado!' : 'Link copied!');
                    alert(msg);
                }
            } catch (err) {
                console.warn('Share failed or cancelled:', err);
            }
        });
    }

    // Search input listener
    const searchInput = document.getElementById('citySearch');
    if (searchInput) {
        searchInput.addEventListener('input', debouncedSearch);
    }

    // Initialize app
    initCountrySelect();
    applyTranslations();
    searchMuseums();
});
</script>
